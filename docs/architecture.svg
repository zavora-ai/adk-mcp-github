<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="hGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1e24"/>
      <stop offset="100%" style="stop-color:#24292e"/>
    </linearGradient>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <rect width="800" height="420" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <rect x="250" y="10" width="300" height="32" rx="8" fill="url(#hGrad)"/>
  <text x="400" y="31" text-anchor="middle" fill="white" font-size="13" font-weight="bold">adk-mcp-github — Architecture</text>

  <!-- MCP Client -->
  <rect x="300" y="55" width="200" height="40" rx="8" fill="#059669"/>
  <text x="400" y="80" text-anchor="middle" fill="white" font-size="11" font-weight="bold">MCP Client (Kiro / Claude)</text>

  <!-- Arrow -->
  <line x1="400" y1="95" x2="400" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#a1)"/>

  <!-- MCP Server -->
  <rect x="200" y="125" width="400" height="100" rx="10" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <rect x="200" y="125" width="400" height="26" rx="10" fill="url(#mGrad)"/>
  <rect x="200" y="138" width="400" height="13" fill="url(#mGrad)"/>
  <text x="400" y="142" text-anchor="middle" fill="white" font-size="11" font-weight="bold">adk-mcp-github (38 tools)</text>

  <!-- Tool categories inside -->
  <rect x="215" y="160" width="115" height="20" rx="4" fill="#eef2ff"/>
  <text x="272" y="174" text-anchor="middle" font-size="8" fill="#3730a3">Repos · Branches</text>
  <rect x="340" y="160" width="115" height="20" rx="4" fill="#eef2ff"/>
  <text x="397" y="174" text-anchor="middle" font-size="8" fill="#3730a3">PRs · Reviews</text>
  <rect x="465" y="160" width="115" height="20" rx="4" fill="#eef2ff"/>
  <text x="522" y="174" text-anchor="middle" font-size="8" fill="#3730a3">Issues · Releases</text>

  <rect x="215" y="186" width="115" height="20" rx="4" fill="#f0fdf4"/>
  <text x="272" y="200" text-anchor="middle" font-size="8" fill="#166534">Files · Dirs · Code</text>
  <rect x="340" y="186" width="115" height="20" rx="4" fill="#f0fdf4"/>
  <text x="397" y="200" text-anchor="middle" font-size="8" fill="#166534">Commits · Tags</text>
  <rect x="465" y="186" width="115" height="20" rx="4" fill="#f0fdf4"/>
  <text x="522" y="200" text-anchor="middle" font-size="8" fill="#166534">CI/Actions</text>

  <!-- Arrows down -->
  <line x1="310" y1="225" x2="310" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="500" y1="225" x2="500" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#a1)"/>

  <!-- GitHub API -->
  <rect x="180" y="265" width="260" height="80" rx="10" fill="white" stroke="#24292e" stroke-width="2"/>
  <rect x="180" y="265" width="260" height="24" rx="10" fill="url(#hGrad)"/>
  <rect x="180" y="276" width="260" height="13" fill="url(#hGrad)"/>
  <text x="310" y="281" text-anchor="middle" fill="white" font-size="10" font-weight="bold">GitHub REST API</text>
  <text x="310" y="305" text-anchor="middle" font-size="9" fill="#374151">api.github.com</text>
  <text x="310" y="320" text-anchor="middle" font-size="8" fill="#6b7280">repos · pulls · issues · actions</text>
  <text x="310" y="335" text-anchor="middle" font-size="8" fill="#6b7280">releases · contents · git refs</text>

  <!-- Local Git -->
  <rect x="470" y="265" width="180" height="80" rx="10" fill="white" stroke="#d97706" stroke-width="2"/>
  <rect x="470" y="265" width="180" height="24" rx="10" fill="#d97706"/>
  <rect x="470" y="276" width="180" height="13" fill="#d97706"/>
  <text x="560" y="281" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Local Git CLI</text>
  <text x="560" y="305" text-anchor="middle" font-size="9" fill="#374151">git binary on PATH</text>
  <text x="560" y="320" text-anchor="middle" font-size="8" fill="#6b7280">clone · init · add · commit</text>
  <text x="560" y="335" text-anchor="middle" font-size="8" fill="#6b7280">push · tag · log · status</text>

  <!-- Auth -->
  <rect x="680" y="125" width="100" height="50" rx="8" fill="#fef2f2" stroke="#dc2626"/>
  <text x="730" y="147" text-anchor="middle" font-size="9" font-weight="bold" fill="#991b1b">Auth</text>
  <text x="730" y="163" text-anchor="middle" font-size="8" fill="#991b1b">GITHUB_TOKEN</text>

  <line x1="680" y1="150" x2="600" y2="150" stroke="#dc2626" stroke-width="1" stroke-dasharray="3" marker-end="url(#a2)"/>

  <!-- Filesystem -->
  <rect x="470" y="360" width="180" height="35" rx="6" fill="#f1f5f9" stroke="#64748b"/>
  <text x="560" y="382" text-anchor="middle" font-size="9" fill="#334155">Local Filesystem</text>

  <line x1="560" y1="345" x2="560" y2="360" stroke="#64748b" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Badge -->
  <rect x="260" y="385" width="280" height="22" rx="11" fill="#4f46e5"/>
  <text x="400" y="400" text-anchor="middle" fill="white" font-size="10" font-weight="bold">38 Tools · GitHub API + Local Git · ADK-Rust Enterprise</text>

  <defs>
    <marker id="a1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#64748b"/>
    </marker>
    <marker id="a2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
